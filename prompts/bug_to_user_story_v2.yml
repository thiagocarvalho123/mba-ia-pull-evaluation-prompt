  techniques_description: >
    Role Prompting: o modelo assume a persona de Product Manager Sênior com expertise em
    metodologias ágeis, orientando tom, profundidade e perspectiva das User Stories geradas.
    Chain of Thought: cinco passos de análise (persona, ação, valor, critérios, complexidade)
    antes de escrever a User Story, melhorando completude e precisão.
    Few-Shot Learning: oito exemplos concretos (quatro simples, três médios e um complexo)
    posicionados antes das instruções para máxima atenção do modelo (efeito de primazia).
    Rubric-based Prompting: critérios internos de qualidade explícitos que o modelo verifica
    antes de gerar a resposta, reduzindo outputs vagos.
    Negative Examples: seção Padrões Proibidos com anti-padrões concretos para evitar
    regressões em tom, formato e completude.
    Emotional Priming: enquadramento da missão como representar a necessidade real de quem foi
    impedido de concluir algo importante, elevando a qualidade do Para que.
